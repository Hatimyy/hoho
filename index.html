<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>HOHO HUB | Script Code</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-card: #13131a;
    --bg-code: #0d0d12;
    --border: rgba(255,255,255,0.06);
    --text: #e4e4eb;
    --text-muted: #5a5a6a;
    --accent: #6366f1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  /* Header */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .verified-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.2);
    color: #10b981;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .script-title {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }
  .script-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .tag {
    padding: 5px 12px;
    border-radius: 20px;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    color: #818cf8;
    font-size: 12px;
    font-weight: 600;
  }
  .dev {
    color: var(--text-muted);
    font-size: 13px;
  }
  /* Image */
  .script-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  /* Code Block */
  .code-wrapper {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .code-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }
  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toolbar-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .toolbar-meta {
    font-size: 12px;
    color: var(--text-muted);
  }
  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-copy {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    box-shadow: 0 4px 16px rgba(99,102,241,0.25);
  }
  .btn-copy:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.35); }
  .btn-copy:active { transform: scale(0.97); }
  .btn-copy.copied {
    background: linear-gradient(135deg, #10b981, #059669);
    box-shadow: 0 4px 16px rgba(16,185,129,0.25);
  }
  .btn-icon {
    width: 36px;
    height: 36px;
    padding: 0;
    justify-content: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-icon:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  /* Code Content */
  .code-body {
    padding: 16px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 2;
    overflow-x: auto;
  }
  .code-line {
    display: flex;
    padding: 0 16px;
    transition: background 0.15s;
  }
  .code-line:hover {
    background: rgba(255,255,255,0.02);
  }
  .line-num {
    color: var(--text-muted);
    font-size: 12px;
    width: 32px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 16px;
    user-select: none;
  }
  .line-content {
    color: #e4e4eb;
    white-space: pre;
  }
  /* Footer */
  .footer {
    text-align: center;
    margin-top: 24px;
    color: var(--text-muted);
    font-size: 12px;
  }
  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    z-index: 1000;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #10b981, #059669);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="toast" id="toast">
  <div class="toast-icon"><i class="fas fa-check"></i></div>
  <span id="toastText">Code copied!</span>
</div>

<div class="container">

  <div class="header">
    <div class="verified-badge">
      <i class="fas fa-check-circle"></i>
      Verified Script
    </div>
    <h1 class="script-title">HOHO HUB</h1>
    <div class="script-meta">
      <span class="tag"><i class="fas fa-code" style="margin-right:4px;"></i>Blox Fruits</span>
      <span class="dev">by @acsu123</span>
    </div>
  </div>

  <img src="https://i.postimg.cc/fbwhR938/858F625C-C0CC-49FC-B24A-413657A54AEB.jpg" alt="HOHO HUB" class="script-img" onerror="this.style.display='none'"/>

  <div class="code-wrapper">
    <div class="code-toolbar">
      <div class="toolbar-left">
        <i class="fas fa-terminal" style="color:#6366f1;"></i>
        <span class="toolbar-title">Script Code</span>
        <span class="toolbar-meta">1 line &middot; 98 B</span>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-icon" title="Download" onclick="downloadCode()">
          <i class="fas fa-download"></i>
        </button>
        <button class="btn btn-copy" id="copyBtn" onclick="copyCode()">
          <i class="fas fa-copy"></i>
          <span>Copy Code</span>
        </button>
      </div>
    </div>
        <div class="code-body" id="codeBody">
<div class="code-line"><span class="line-num">1</span><span class="line-content"><span style="color:#10b981;font-weight:600;">loadstring</span>(<span style="color:#a855f7;">game:HttpGet</span>(<span style="color:#06b6d4;">"https://raw.githubusercontent.com/acsu123/HOHO_H/main/Loading_UI"</span>))()</span></div>
    </div>
  </div>
  </div>

  <div class="footer">
    <i class="fas fa-shield-alt" style="margin-right:4px;"></i>
    This script is provided as-is. Use at your own risk.
  </div>

</div>

<script>
const codeText = `loadstring(game:HttpGet("https://raw.githubusercontent.com/acsu123/HOHO_H/main/Loading_UI"))()`;

function copyCode() {
  navigator.clipboard.writeText(codeText).then(() => {
    const btn = document.getElementById('copyBtn');
    const originalHTML = btn.innerHTML;
    btn.classList.add('copied');
    btn.innerHTML = '<i class="fas fa-check"></i><span>Copied!</span>';
    showToast('Code copied to clipboard!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = originalHTML;
    }, 2000);
  }).catch(() => {
    fallbackCopy();
  });
}

function fallbackCopy() {
  const textarea = document.createElement('textarea');
  textarea.value = codeText;
  textarea.style.cssText = 'position:fixed;opacity:0;';
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);
  showToast('Code copied to clipboard!');
}

function downloadCode() {
  const blob = new Blob([codeText], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'HOHO_HUB_script.lua';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Script downloaded!');
}

function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = message;
  toast.classList.add('show');
  setTimeout(() => { toast.classList.remove('show'); }, 3000);
}
</script>

</body>
</html>
